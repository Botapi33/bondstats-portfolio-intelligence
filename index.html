<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BondStats Portfolio Risk Check</title>

<style>
:root{
--bg:#071021;
--panel:#111b33;
--card:#16254a;
--card2:#10203f;
--border:#2a4275;
--accent:#35b7ff;
--success:#00e0b0;
--danger:#ff5d73;
--warning:#ffbd4a;
--text:#f4f8ff;
--muted:#a7b8db;
--radius:16px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
min-height:100%;
overflow-x:hidden;
}

body{
font-family:Inter,Segoe UI,Arial,sans-serif;
background:linear-gradient(135deg,#081426,#0b1f4a 55%,#081426);
color:var(--text);
padding:14px;
}

.container{
width:100%;
max-width:1180px;
margin:0 auto;
}

header{
margin-bottom:18px;
}

.logo{
font-size:clamp(24px,5vw,34px);
font-weight:900;
letter-spacing:-1px;
}

.logo span{
color:var(--success);
}

.subtitle{
color:var(--muted);
font-size:14px;
margin-top:4px;
}

.app{
display:grid;
grid-template-columns:minmax(260px,340px) minmax(0,1fr);
gap:18px;
align-items:start;
}

.panel,
.card,
.chartCard,
.tip,
.assetsBox{
background:linear-gradient(180deg,rgba(31,58,120,.88),rgba(10,25,56,.92));
border:1px solid var(--border);
border-radius:var(--radius);
box-shadow:0 20px 60px rgba(0,0,0,.22);
}

.panel{
padding:18px;
position:sticky;
top:14px;
}

.panel h2{
font-size:24px;
margin-bottom:16px;
}

label{
display:block;
color:var(--text);
font-size:13px;
font-weight:700;
margin:12px 0 6px;
}

input,
select{
width:100%;
height:42px;
background:#091a36;
border:1px solid #3d68ad;
border-radius:12px;
color:white;
padding:0 12px;
font-size:14px;
outline:none;
}

input:focus,
select:focus{
border-color:var(--accent);
box-shadow:0 0 0 3px rgba(53,183,255,.18);
}

button{
border:0;
cursor:pointer;
border-radius:12px;
font-weight:800;
transition:.2s;
}

.primary{
width:100%;
height:44px;
margin-top:16px;
background:linear-gradient(135deg,#22c6ff,#2187ff);
color:white;
}

.main{
min-width:0;
}

.stats{
display:grid;
grid-template-columns:repeat(4,minmax(0,1fr));
gap:14px;
margin-bottom:16px;
}

.card{
padding:16px;
min-width:0;
}

.card h3{
font-size:13px;
line-height:1.2;
color:var(--text);
margin-bottom:12px;
}

.big{
font-size:clamp(26px,4vw,34px);
font-weight:900;
line-height:1;
word-break:break-word;
}

.health{
height:16px;
background:#08152b;
border-radius:999px;
overflow:hidden;
margin-top:12px;
}

.healthFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff5d73,#ffbd4a,#00e0b0);
transition:.4s;
}

.assetsBox{
overflow:hidden;
margin-bottom:18px;
}

.tableScroll{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

table{
width:100%;
border-collapse:collapse;
min-width:720px;
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:14px;
}

th{
background:rgba(52,104,203,.35);
font-size:13px;
}

.removeBtn{
background:var(--danger);
color:white;
padding:8px 10px;
border-radius:10px;
}

.sectionTitle{
font-size:22px;
font-weight:900;
margin:18px 0 12px;
}.chartGrid{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:14px;
}

.chartCard{
padding:16px;
min-width:0;
}

.chartCard h4{
font-size:16px;
margin-bottom:14px;
}

.barItem{
margin-bottom:13px;
}

.barHeader{
display:flex;
justify-content:space-between;
gap:10px;
font-size:13px;
margin-bottom:6px;
}

.barHeader span:first-child{
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.barWrap{
height:12px;
background:#08152b;
border-radius:999px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--success),var(--accent));
border-radius:999px;
transition:.4s;
}

.intelligence{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:14px;
}

.tip{
padding:16px;
border-left:5px solid var(--success);
}

.tipTitle{
font-weight:900;
margin-bottom:8px;
}

.tipText{
font-size:14px;
line-height:1.45;
color:var(--muted);
}

@media(max-width:1050px){
.container{
max-width:920px;
}
.app{
grid-template-columns:1fr;
}
.panel{
position:relative;
top:auto;
}
.formGrid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:0 14px;
}
.stats{
grid-template-columns:repeat(2,minmax(0,1fr));
}
.chartGrid{
grid-template-columns:1fr;
}
.intelligence{
grid-template-columns:1fr;
}
}

@media(max-width:620px){
body{
padding:10px;
}
.panel{
padding:14px;
}
.formGrid{
grid-template-columns:1fr;
}
.stats{
grid-template-columns:1fr;
gap:10px;
}
.card,
.chartCard,
.tip{
padding:14px;
}
table{
min-width:640px;
}
th,td{
padding:10px;
font-size:13px;
}
.sectionTitle{
font-size:19px;
}
}

@media(max-width:420px){
body{
padding:8px;
}
.logo{
font-size:24px;
}
.subtitle{
font-size:13px;
}
.panel h2{
font-size:21px;
}
input,
select{
height:40px;
}
.primary{
height:42px;
}
}
</style>
</head>

<body>

<div class="container">

<header>
<div class="logo">Bond<span>Stats</span></div>
<div class="subtitle">Portfolio Risk Check</div>
</header>

<div class="app">

<aside class="panel">
<h2>Add Asset</h2>

<div class="formGrid">

<div>
<label>Asset Name</label>
<input id="assetName" placeholder="e.g. Apple Inc.">
</div>

<div>
<label>Asset Type</label>
<select id="assetType">
<option>Stock</option>
<option>Bond</option>
<option>ETF</option>
<option>Crypto</option>
<option>Commodity</option>
<option>Cash</option>
<option>Real Estate</option>
</select>
</div>

<div>
<label>Allocation (%)</label>
<input id="allocation" type="number" min="0" max="100" placeholder="20">
</div>

<div>
<label>Region</label>
<select id="region">
<option>North America</option>
<option>Europe</option>
<option>Asia</option>
<option>South America</option>
<option>Africa</option>
<option>Middle East</option>
<option>Global</option>
</select>
</div>

<div>
<label>Sector</label>
<select id="sector">
<option>Technology</option>
<option>Finance</option>
<option>Healthcare</option>
<option>Energy</option>
<option>Consumer</option>
<option>Industrial</option>
<option>Utilities</option>
<option>Government</option>
<option>Mixed</option>
</select>
</div>

<div>
<label>Risk Level</label>
<select id="risk">
<option value="1">Very Low</option>
<option value="2">Low</option>
<option value="3" selected>Medium</option>
<option value="4">High</option>
<option value="5">Very High</option>
</select>
</div>

</div>

<button class="primary" onclick="addAsset()">Add Asset</button>
</aside>

<main class="main">

<section class="stats">

<div class="card">
<h3>Portfolio Health Score</h3>
<div class="big" id="healthScore">0</div>
<div class="health">
<div class="healthFill" id="healthFill"></div>
</div>
</div>

<div class="card">
<h3>Diversification Score</h3>
<div class="big" id="divScore">0</div>
</div>
<div class="card">
<h3>Overall Risk</h3>
<div class="big" id="riskScore">-</div>
</div>

<div class="card">
<h3>Total Allocation</h3>
<div class="big" id="totalAllocation">0%</div>
</div>

</section>

<section class="assetsBox">
<div class="tableScroll">
<table>
<thead>
<tr>
<th>Asset</th>
<th>Type</th>
<th>Allocation</th>
<th>Region</th>
<th>Sector</th>
<th>Risk</th>
<th>Action</th>
</tr>
</thead>
<tbody id="assetTableBody"></tbody>
</table>
</div>
</section>

<div class="sectionTitle">Portfolio Analytics</div>

<section class="chartGrid">

<div class="chartCard">
<h4>Asset Mix</h4>
<div id="assetMixChart"></div>
</div>

<div class="chartCard">
<h4>Region Exposure</h4>
<div id="regionChart"></div>
</div>

<div class="chartCard">
<h4>Sector Exposure</h4>
<div id="sectorChart"></div>
</div>

</section>

<div class="sectionTitle">Portfolio Intelligence</div>

<section class="intelligence" id="tips"></section>

</main>

</div>

</div>

<script>
let assets=JSON.parse(localStorage.getItem("bondstats_assets"))||[];

function saveData(){
localStorage.setItem("bondstats_assets",JSON.stringify(assets));
}

function addAsset(){
const name=document.getElementById("assetName").value.trim();
const type=document.getElementById("assetType").value;
const allocation=parseFloat(document.getElementById("allocation").value);
const region=document.getElementById("region").value;
const sector=document.getElementById("sector").value;
const risk=parseInt(document.getElementById("risk").value);

if(!name||isNaN(allocation)||allocation<=0){
alert("Please enter an asset name and a valid allocation.");
return;
}

assets.push({id:Date.now(),name,type,allocation,region,sector,risk});
saveData();
clearForm();
render();
}

function clearForm(){
document.getElementById("assetName").value="";
document.getElementById("allocation").value="";
document.getElementById("assetType").selectedIndex=0;
document.getElementById("region").selectedIndex=0;
document.getElementById("sector").selectedIndex=0;
document.getElementById("risk").value="3";
}

function deleteAsset(id){
assets=assets.filter(asset=>asset.id!==id);
saveData();
render();
}

function escapeHTML(text){
return text.replace(/[&<>"']/g,function(c){
return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c];
});
}

function totalAllocation(){
return assets.reduce((sum,asset)=>sum+asset.allocation,0);
}

function sumBy(key){
const result={};
assets.forEach(asset=>{
if(!result[asset[key]])result[asset[key]]=0;
result[asset[key]]+=asset.allocation;
});
return result;
}

function weightedRisk(){
const total=totalAllocation();
if(total===0)return 0;
return assets.reduce((sum,asset)=>sum+(asset.risk*asset.allocation),0)/total;
}

function riskLabel(value){
if(value<=1.5)return"Very Low";
if(value<=2.5)return"Low";
if(value<=3.5)return"Medium";
if(value<=4.5)return"High";
return"Very High";
}
  function riskBadge(value){
const label=riskLabel(value);
if(value<=2)return`<span style="color:#00e0b0;font-weight:900">${label}</span>`;
if(value<=3.5)return`<span style="color:#ffbd4a;font-weight:900">${label}</span>`;
return`<span style="color:#ff5d73;font-weight:900">${label}</span>`;
}

function diversificationScore(){
if(assets.length===0)return 0;
const types=Object.keys(sumBy("type")).length;
const regions=Object.keys(sumBy("region")).length;
const sectors=Object.keys(sumBy("sector")).length;
let score=(types*18)+(regions*14)+(sectors*12)+Math.min(assets.length*5,20);

["type","region","sector"].forEach(key=>{
Object.values(sumBy(key)).forEach(value=>{
if(value>45)score-=8;
if(value>60)score-=12;
});
});

return Math.max(0,Math.min(100,Math.round(score)));
}

function portfolioHealth(){
const total=totalAllocation();
const div=diversificationScore();
const risk=weightedRisk();
let allocationScore=100-Math.abs(100-total)*1.6;
allocationScore=Math.max(0,Math.min(100,allocationScore));
let riskScore=100;
if(risk>3.2)riskScore-=((risk-3.2)*22);
if(risk<1.8)riskScore-=((1.8-risk)*12);
return Math.max(0,Math.min(100,Math.round((allocationScore*.35)+(div*.45)+(riskScore*.20))));
}

function renderTable(){
const body=document.getElementById("assetTableBody");
if(assets.length===0){
body.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:22px;color:#a7b8db">No assets added yet.</td></tr>`;
return;
}
body.innerHTML=assets.map(asset=>`
<tr>
<td><strong>${escapeHTML(asset.name)}</strong></td>
<td>${asset.type}</td>
<td>${asset.allocation.toFixed(1)}%</td>
<td>${asset.region}</td>
<td>${asset.sector}</td>
<td>${riskBadge(asset.risk)}</td>
<td><button class="removeBtn" onclick="deleteAsset(${asset.id})">Delete</button></td>
</tr>
`).join("");
}

function renderBars(targetId,data){
const target=document.getElementById(targetId);
const entries=Object.entries(data).sort((a,b)=>b[1]-a[1]);
if(entries.length===0){
target.innerHTML=`<div style="color:#a7b8db;font-size:14px">No data available.</div>`;
return;
}
target.innerHTML=entries.map(([label,value])=>`
<div class="barItem">
<div class="barHeader"><span>${label}</span><span>${value.toFixed(1)}%</span></div>
<div class="barWrap"><div class="bar" style="width:${Math.min(value,100)}%"></div></div>
</div>
`).join("");
}

function generateTips(){
const tips=[];
const total=totalAllocation();
const div=diversificationScore();
const risk=weightedRisk();
const types=sumBy("type");
const regions=sumBy("region");
const sectors=sumBy("sector");

if(assets.length===0){
return[{title:"Start Your Portfolio",text:"Add your first asset to calculate health, diversification, risk and exposure metrics."}];
}

if(total<95)tips.push({title:"Portfolio Is Underallocated",text:`Your total allocation is ${total.toFixed(1)}%. You still have ${(100-total).toFixed(1)}% unassigned capital.`});
if(total>105)tips.push({title:"Portfolio Is Overallocated",text:`Your total allocation is ${total.toFixed(1)}%. Reduce positions by ${(total-100).toFixed(1)}% to get closer to 100%.`});
if(div>=80)tips.push({title:"Strong Diversification",text:"Your portfolio is well spread across asset types, regions and sectors."});
if(div<50)tips.push({title:"Improve Diversification",text:"Add more asset types, regions or sectors to reduce concentration risk."});

Object.entries(types).forEach(([name,value])=>{
if(value>50)tips.push({title:`High ${name} Concentration`,text:`${value.toFixed(1)}% of your portfolio is allocated to ${name}. Check whether this matches your risk tolerance.`});
});

Object.entries(regions).forEach(([name,value])=>{
if(value>55)tips.push({title:"Regional Concentration Risk",text:`${value.toFixed(1)}% of your portfolio is exposed to ${name}. Broader regional exposure may reduce volatility.`});
});

Object.entries(sectors).forEach(([name,value])=>{
if(value>45)tips.push({title:"Sector Concentration Risk",text:`${value.toFixed(1)}% of your portfolio is allocated to ${name}. Review dependence on a single market cycle.`});
});

if(risk>=4)tips.push({title:"High Risk Profile",text:"Your weighted portfolio risk is high. Bonds, cash or broad ETFs may help reduce volatility."});
if(risk>0&&risk<=2)tips.push({title:"Defensive Risk Profile",text:"Your portfolio is very defensive. Check whether the expected return still fits your long-term goals."});
if(assets.length<4)tips.push({title:"Limited Number Of Holdings",text:"With fewer than four assets, your portfolio may be sensitive to single-position movements."});

if(tips.length===0)tips.push({title:"Balanced Setup",text:"Your portfolio metrics look stable. Continue reviewing allocation, risk and exposure regularly."});
return tips.slice(0,8);
}

function renderTips(){
document.getElementById("tips").innerHTML=generateTips().map(tip=>`
<div class="tip">
<div class="tipTitle">${tip.title}</div>
<div class="tipText">${tip.text}</div>
</div>
`).join("");
}

function renderStats(){
const total=totalAllocation();
const div=diversificationScore();
const health=portfolioHealth();
const risk=weightedRisk();

document.getElementById("totalAllocation").textContent=`${total.toFixed(1)}%`;
document.getElementById("divScore").textContent=div;
document.getElementById("healthScore").textContent=health;
document.getElementById("healthFill").style.width=`${health}%`;
document.getElementById("riskScore").innerHTML=risk===0?"-":riskBadge(risk);
}

function render(){
renderStats();
renderTable();
renderBars("assetMixChart",sumBy("type"));
renderBars("regionChart",sumBy("region"));
renderBars("sectorChart",sumBy("sector"));
renderTips();
}

render();
</script>

</body>
</html>
