<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BondStats Portfolio Risk Check</title>

<style>
:root{
--bg:#0b1020;
--panel:#141c31;
--card:#202c4d;
--border:#2e3b63;
--accent:#58a6ff;
--success:#00d4a6;
--danger:#ff5d73;
--warning:#ffb648;
--text:#f2f6ff;
--muted:#9fb0d3;
--radius:18px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Segoe UI,Arial,sans-serif;
}

body{
background:radial-gradient(circle at top,#1b2955,#0b1020 60%);
color:var(--text);
padding:18px;
}

.container{
max-width:1450px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:800;
}

.logo span{
color:var(--success);
}

.subtitle{
margin-top:6px;
color:var(--muted);
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:20px;
}

.panel{
background:#141c31;
border:1px solid var(--border);
border-radius:var(--radius);
padding:20px;
}

.panel h2{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-size:13px;
color:var(--muted);
}

input,
select{
width:100%;
padding:12px;
margin-bottom:14px;
background:#10182d;
border:1px solid var(--border);
border-radius:12px;
color:white;
outline:none;
}

input:focus,
select:focus{
border-color:var(--accent);
}

button{
border:none;
cursor:pointer;
padding:12px 16px;
border-radius:12px;
font-weight:700;
transition:.2s;
}

.primary{
width:100%;
background:linear-gradient(135deg,var(--accent),#4b6fff);
color:white;
}

.primary:hover{
transform:translateY(-2px);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:18px;
}

.card{
background:#202c4d;
border:1px solid var(--border);
border-radius:16px;
padding:16px;
}

.card h3{
font-size:13px;
color:var(--muted);
margin-bottom:10px;
font-weight:500;
}

.big{
font-size:30px;
font-weight:800;
}

.health{
margin-top:10px;
height:16px;
background:#0d1528;
border-radius:999px;
overflow:hidden;
}

.healthFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff5d73,#ffb648,#00d4a6);
transition:.4s;
}

.assetsTable{
overflow:auto;
border-radius:16px;
border:1px solid var(--border);
}

table{
width:100%;
border-collapse:collapse;
min-width:860px;
}

th,
td{
padding:12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.05);
}

th{
background:#17213c;
font-size:13px;
}

.removeBtn{
background:var(--danger);
color:white;
padding:8px 12px;
border-radius:8px;
}

.sectionTitle{
margin:20px 0 15px;
font-size:20px;
font-weight:700;
}

.chartGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:18px;
}

.chartCard{
background:#1a2440;
border:1px solid var(--border);
padding:16px;
border-radius:16px;
}

.chartCard h4{
margin-bottom:14px;
}

.barItem{
margin-bottom:14px;
}

.barHeader{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:13px;
}

.barWrap{
height:12px;
background:#0f182c;
border-radius:999px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--success),var(--accent));
transition:.4s;
}

.intelligence{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
margin-top:18px;
}

.tip{
background:#19233f;
border-left:5px solid var(--success);
border-radius:14px;
padding:16px;
}

.tipTitle{
font-weight:700;
margin-bottom:8px;
}

.tipText{
font-size:14px;
line-height:1.5;
color:var(--muted);
}

@media(max-width:980px){
.grid{
grid-template-columns:1fr;
}
}

@media(max-width:650px){
.stats{
grid-template-columns:1fr;
}
.logo{
font-size:24px;
}
}
</style>
</head>

<body>

<div class="container">

<header>
<div>
<div class="logo">Bond<span>Stats</span></div>
<div class="subtitle">Portfolio Risk Check</div>
</div>
</header>

<div class="grid">

<div class="panel">

<h2>Add Asset</h2>

<label>Asset Name</label>
<input id="assetName" placeholder="e.g. Apple Inc.">

<label>Asset Type</label>
<select id="assetType">
<option>Stock</option>
<option>Bond</option>
<option>ETF</option>
<option>Crypto</option>
<option>Commodity</option>
<option>Cash</option>
<option>Real Estate</option>
</select>

<label>Allocation (%)</label>
<input id="allocation" type="number" min="0" max="100" placeholder="20">

<label>Region</label>
<select id="region">
<option>North America</option>
<option>Europe</option>
<option>Asia</option>
<option>South America</option>
<option>Africa</option>
<option>Middle East</option>
<option>Global</option>
</select>

<label>Sector</label>
<select id="sector">
<option>Technology</option>
<option>Finance</option>
<option>Healthcare</option>
<option>Energy</option>
<option>Consumer</option>
<option>Industrial</option>
<option>Utilities</option>
<option>Government</option>
<option>Mixed</option>
</select>

<label>Risk Level</label>
<select id="risk">
<option value="1">Very Low</option>
<option value="2">Low</option>
<option value="3">Medium</option>
<option value="4">High</option>
<option value="5">Very High</option>
</select>

<button class="primary" onclick="addAsset()">
Add Asset
</button>

</div>

<div>

<div class="stats">

<div class="card">
<h3>Portfolio Health Score</h3>
<div class="big" id="healthScore">0</div>
<div class="health">
<div class="healthFill" id="healthFill"></div>
</div>
</div>

<div class="card">
<h3>Diversification Score</h3>
<div class="big" id="divScore">0</div>
</div>

<div class="card">
<h3>Overall Risk</h3>
<div class="big" id="riskScore">-</div>
</div>

<div class="card">
<h3>Total Allocation</h3>
<div class="big" id="totalAllocation">0%</div>
</div>

</div>

<div class="assetsTable">

<table>

<thead>
<tr>
<th>Asset</th>
<th>Type</th>
<th>Allocation</th>
<th>Region</th>
<th>Sector</th>
<th>Risk</th>
<th>Action</th>
</tr>
</thead>

<tbody id="assetTableBody"></tbody>

</table>

</div>

<div class="sectionTitle">
Portfolio Analytics
</div>

<div class="chartGrid">

<div class="chartCard">
<h4>Asset Mix</h4>
<div id="assetMixChart"></div>
</div>

<div class="chartCard">
<h4>Region Exposure</h4>
<div id="regionChart"></div>
</div>

<div class="chartCard">
<h4>Sector Exposure</h4>
<div id="sectorChart"></div>
</div>

</div>

<div class="sectionTitle">
Portfolio Intelligence
</div>

<div class="intelligence" id="tips"></div>

</div>

</div>

<script>

let assets=JSON.parse(localStorage.getItem("bondstats_assets"))||[];

function saveData(){
localStorage.setItem("bondstats_assets",JSON.stringify(assets));
}
  function addAsset(){

const name=document.getElementById("assetName").value.trim();
const type=document.getElementById("assetType").value;
const allocation=parseFloat(document.getElementById("allocation").value);
const region=document.getElementById("region").value;
const sector=document.getElementById("sector").value;
const risk=parseInt(document.getElementById("risk").value);

if(!name || isNaN(allocation) || allocation<=0){
alert("Please enter an asset name and a valid allocation.");
return;
}

assets.push({
id:Date.now(),
name,
type,
allocation,
region,
sector,
risk
});

saveData();
clearForm();
render();

}

function clearForm(){

document.getElementById("assetName").value="";
document.getElementById("allocation").value="";
document.getElementById("assetType").selectedIndex=0;
document.getElementById("region").selectedIndex=0;
document.getElementById("sector").selectedIndex=0;
document.getElementById("risk").selectedIndex=2;

}

function deleteAsset(id){

assets=assets.filter(a=>a.id!==id);

saveData();
render();

}

function riskLabel(v){

if(v<=1.5) return "Very Low";
if(v<=2.5) return "Low";
if(v<=3.5) return "Medium";
if(v<=4.5) return "High";
return "Very High";

}

function riskBadge(v){

const label=riskLabel(v);

if(v<=2){
return `<span style="color:#00d4a6;font-weight:700">${label}</span>`;
}

if(v<=3.5){
return `<span style="color:#ffb648;font-weight:700">${label}</span>`;
}

return `<span style="color:#ff5d73;font-weight:700">${label}</span>`;

}

function totalAllocation(){

return assets.reduce((sum,a)=>sum+a.allocation,0);

}

function weightedRisk(){

const total=totalAllocation();

if(total===0) return 0;

return assets.reduce(
(sum,a)=>sum+(a.risk*a.allocation),
0
)/total;

}

function sumBy(key){

const obj={};

assets.forEach(asset=>{

if(!obj[asset[key]]) obj[asset[key]]=0;

obj[asset[key]]+=asset.allocation;

});

return obj;

}

function diversificationScore(){

if(assets.length===0) return 0;

const types=Object.keys(sumBy("type")).length;
const regions=Object.keys(sumBy("region")).length;
const sectors=Object.keys(sumBy("sector")).length;

let score=
(types*18)+
(regions*14)+
(sectors*12)+
Math.min(assets.length*5,20);

["type","region","sector"].forEach(group=>{

const values=sumBy(group);

Object.values(values).forEach(v=>{

if(v>45) score-=8;
if(v>60) score-=12;

});

});

score=Math.max(0,Math.min(100,Math.round(score)));

return score;

}

function portfolioHealth(){

const allocation=totalAllocation();

const diversification=diversificationScore();

const risk=weightedRisk();

let allocationScore=
100-Math.abs(100-allocation)*1.6;

allocationScore=
Math.max(0,Math.min(100,allocationScore));

let riskScore=100;

if(risk>3.2){
riskScore-=((risk-3.2)*22);
}

if(risk<1.8){
riskScore-=((1.8-risk)*12);
}

let health=
allocationScore*0.35+
diversification*0.45+
riskScore*0.20;

health=Math.round(
Math.max(0,Math.min(100,health))
);

return health;

}

function escapeHTML(text){

return text.replace(/[&<>"']/g,function(c){

return{
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#039;"
}[c];

});

}

function renderTable(){

const tbody=document.getElementById("assetTableBody");

if(assets.length===0){

tbody.innerHTML=`
<tr>
<td colspan="7"
style="text-align:center;padding:24px;color:#9fb0d3">
No assets added yet.
</td>
</tr>
`;

return;

}

tbody.innerHTML=assets.map(asset=>`

<tr>

<td><strong>${escapeHTML(asset.name)}</strong></td>

<td>${asset.type}</td>

<td>${asset.allocation.toFixed(1)}%</td>

<td>${asset.region}</td>

<td>${asset.sector}</td>

<td>${riskBadge(asset.risk)}</td>

<td>

<button
class="removeBtn"
onclick="deleteAsset(${asset.id})">

Delete

</button>

</td>

</tr>

`).join("");

}
  function renderBars(targetId,data){

const target=document.getElementById(targetId);
const entries=Object.entries(data).sort((a,b)=>b[1]-a[1]);

if(entries.length===0){
target.innerHTML=`<div style="color:#9fb0d3;font-size:14px">No data available.</div>`;
return;
}

target.innerHTML=entries.map(([label,value])=>`
<div class="barItem">
<div class="barHeader">
<span>${label}</span>
<span>${value.toFixed(1)}%</span>
</div>
<div class="barWrap">
<div class="bar" style="width:${Math.min(value,100)}%"></div>
</div>
</div>
`).join("");

}

function generateTips(){

const tips=[];
const total=totalAllocation();
const div=diversificationScore();
const risk=weightedRisk();

const types=sumBy("type");
const regions=sumBy("region");
const sectors=sumBy("sector");

if(assets.length===0){
tips.push({
title:"Start Your Portfolio",
text:"Add your first asset to calculate health, diversification, risk and exposure metrics."
});
return tips;
}

if(total<95){
tips.push({
title:"Portfolio Is Underallocated",
text:`Your total allocation is ${total.toFixed(1)}%. You still have ${(100-total).toFixed(1)}% unassigned capital.`
});
}

if(total>105){
tips.push({
title:"Portfolio Is Overallocated",
text:`Your total allocation is ${total.toFixed(1)}%. Reduce positions by ${(total-100).toFixed(1)}% to get closer to 100%.`
});
}

if(div>=80){
tips.push({
title:"Strong Diversification",
text:"Your portfolio is well spread across asset types, regions and sectors."
});
}

if(div<50){
tips.push({
title:"Improve Diversification",
text:"Add more asset types, regions or sectors to reduce concentration risk."
});
}

Object.entries(types).forEach(([name,value])=>{
if(value>50){
tips.push({
title:`High ${name} Concentration`,
text:`${value.toFixed(1)}% of your portfolio is allocated to ${name}. Check whether this matches your risk tolerance.`
});
}
});

Object.entries(regions).forEach(([name,value])=>{
if(value>55){
tips.push({
title:"Regional Concentration Risk",
text:`${value.toFixed(1)}% of your portfolio is exposed to ${name}. Broader regional exposure may reduce volatility.`
});
}
});

Object.entries(sectors).forEach(([name,value])=>{
if(value>45){
tips.push({
title:"Sector Concentration Risk",
text:`${value.toFixed(1)}% of your portfolio is allocated to ${name}. Review dependence on a single market cycle.`
});
}
});

if(risk>=4){
tips.push({
title:"High Risk Profile",
text:"Your weighted portfolio risk is high. Bonds, cash or broad ETFs may help reduce volatility."
});
}

if(risk>0 && risk<=2){
tips.push({
title:"Defensive Risk Profile",
text:"Your portfolio is very defensive. Check whether the expected return still fits your long-term goals."
});
}

if(assets.length<4){
tips.push({
title:"Limited Number Of Holdings",
text:"With fewer than four assets, your portfolio may be sensitive to single-position movements."
});
}

if(tips.length===0){
tips.push({
title:"Balanced Setup",
text:"Your portfolio metrics look stable. Continue reviewing allocation, risk and exposure regularly."
});
}

return tips.slice(0,8);

}

function renderTips(){

const box=document.getElementById("tips");
const tips=generateTips();

box.innerHTML=tips.map(tip=>`
<div class="tip">
<div class="tipTitle">${tip.title}</div>
<div class="tipText">${tip.text}</div>
</div>
`).join("");

}

function renderStats(){

const total=totalAllocation();
const div=diversificationScore();
const health=portfolioHealth();
const risk=weightedRisk();

document.getElementById("totalAllocation").textContent=
`${total.toFixed(1)}%`;

document.getElementById("divScore").textContent=
div;

document.getElementById("healthScore").textContent=
health;

document.getElementById("healthFill").style.width=
`${health}%`;

document.getElementById("riskScore").innerHTML=
risk===0 ? "-" : riskBadge(risk);

}
  function render(){

renderStats();
renderTable();

renderBars(
"assetMixChart",
sumBy("type")
);

renderBars(
"regionChart",
sumBy("region")
);

renderBars(
"sectorChart",
sumBy("sector")
);

renderTips();

}

render();

</script>

</div>

</body>
</html>
